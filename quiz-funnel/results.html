<!-- =====================================================
     UNIFIED TRACKER — collects all URL/cookie/IP data
     ===================================================== -->
<script>
(function() {
  'use strict';

  var CONFIG = {
    cookieExpiry: 90,
    debug: true,
    ipEndpoint: 'https://api64.ipify.org?format=json',
    ipFallback: 'https://api.ipify.org?format=json'
  };

  var Storage = {
    set: function(name, value) {
      if (!value) return;
      try {
        var expires = new Date(Date.now() + CONFIG.cookieExpiry * 86400000).toUTCString();
        document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires + ';path=/;SameSite=Lax;Secure';
      } catch(e) {}
      try { localStorage.setItem('_tr_' + name, JSON.stringify({ value: value, expires: Date.now() + CONFIG.cookieExpiry * 86400000 })); } catch(e) {}
      try { sessionStorage.setItem('_tr_' + name, value); } catch(e) {}
    },
    get: function(name) {
      var value = null;
      try {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        if (match) value = decodeURIComponent(match[2]);
      } catch(e) {}
      if (!value) {
        try {
          var stored = localStorage.getItem('_tr_' + name);
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed.expires > Date.now()) value = parsed.value;
            else localStorage.removeItem('_tr_' + name);
          }
        } catch(e) {}
      }
      if (!value) { try { value = sessionStorage.getItem('_tr_' + name); } catch(e) {} }
      return value;
    }
  };

  var params = new URL(location.href).searchParams;

  var fbclid = params.get('fbclid') || Storage.get('fbclid');
  if (params.get('fbclid')) Storage.set('fbclid', params.get('fbclid'));

  var fbc = params.get('fbc') || null;
  if (!fbc) { try { var fbcMatch = document.cookie.match(/(^| )_fbc=([^;]+)/); if (fbcMatch) fbc = decodeURIComponent(fbcMatch[2]); } catch(e) {} }
  if (!fbc) fbc = Storage.get('fbc');
  if (!fbc && fbclid) fbc = 'fb.1.' + Date.now() + '.' + fbclid;
  if (fbc) Storage.set('fbc', fbc);

  var fbp = params.get('fbp') || null;
  if (!fbp) { try { var fbpMatch = document.cookie.match(/(^| )_fbp=([^;]+)/); if (fbpMatch) fbp = decodeURIComponent(fbpMatch[2]); } catch(e) {} }
  if (!fbp) fbp = Storage.get('fbp');
  if (!fbp) fbp = 'fb.1.' + Date.now() + '.' + Math.floor(Math.random() * 10000000000);
  if (fbp) Storage.set('fbp', fbp);

  var utmFields = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_campaign_id', 'utm_adset', 'utm_adset_id', 'utm_ad', 'utm_ad_id', 'utm_content', 'utm_term'];
  var utmData = {};
  utmFields.forEach(function(field) {
    var urlValue = params.get(field);
    var storedValue = Storage.get(field);
    if (urlValue && !storedValue) { Storage.set(field, urlValue); utmData[field] = urlValue; }
    else utmData[field] = urlValue || storedValue;
  });

  function generateBrowserId() {
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillText('browser-id', 2, 2);
    var data = [navigator.userAgent, navigator.language, screen.width + 'x' + screen.height, new Date().getTimezoneOffset(), canvas.toDataURL()].join('|');
    var hash = 0;
    for (var i = 0; i < data.length; i++) { hash = ((hash << 5) - hash) + data.charCodeAt(i); hash = hash & hash; }
    return 'bid.' + Math.abs(hash).toString(36) + '.' + Date.now();
  }
  var browserId = Storage.get('browser_id');
  if (!browserId) { browserId = generateBrowserId(); Storage.set('browser_id', browserId); }

  window.UnifiedTracker = {
    data: {
      fbclid: fbclid, fbc: fbc, fbp: fbp, browser_id: browserId,
      user_agent: navigator.userAgent, source_url: location.href,
      referrer: document.referrer || null, client_ip: null,
      utm_source: utmData.utm_source, utm_medium: utmData.utm_medium,
      utm_campaign: utmData.utm_campaign, utm_campaign_id: utmData.utm_campaign_id,
      utm_adset: utmData.utm_adset, utm_adset_id: utmData.utm_adset_id,
      utm_ad: utmData.utm_ad, utm_ad_id: utmData.utm_ad_id,
      utm_content: utmData.utm_content, utm_term: utmData.utm_term,
    },
    debug: function() {
      console.log('%c UnifiedTracker Data', 'font-size: 14px; font-weight: bold;');
      console.table(this.data);
      return this.data;
    }
  };

  function fetchIP(url, retries) {
    return fetch(url, { mode: 'cors' })
      .then(function(r) { if (!r.ok) throw new Error('IP fetch failed'); return r.json(); })
      .then(function(data) { Storage.set('client_ip', data.ip); window.UnifiedTracker.data.client_ip = data.ip; return data.ip; })
      .catch(function(err) {
        if (retries > 0 && url === CONFIG.ipEndpoint) return fetchIP(CONFIG.ipFallback, retries - 1);
        var storedIP = Storage.get('client_ip');
        if (storedIP) window.UnifiedTracker.data.client_ip = storedIP;
        return storedIP;
      });
  }

  fetchIP(CONFIG.ipEndpoint, 2).finally(function() {
    if (CONFIG.debug) window.UnifiedTracker.debug();
  });
})();
</script>

<!-- =====================================================
     N8N WEBHOOK TRACKING
     ===================================================== -->
<script>
(function() {
  'use strict';

  // Use session ID from URL params or generate new one
  var urlParams = new URL(location.href).searchParams;
  var SESSION_ID = urlParams.get('sid') || 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });

  var variant = urlParams.get('variant') || 'control';

  var N8N = {
    page_view:       'https://n8n.dtthomas.cloud/webhook/deenbuddy-pageview',
    quiz_start:      'https://n8n.dtthomas.cloud/webhook/deenbuddy-quiz-start',
    quiz_step:       'https://n8n.dtthomas.cloud/webhook/deenbuddy-quiz-step',
    quiz_complete:   'https://n8n.dtthomas.cloud/webhook/deenbuddy-quiz-complete',
    lead:            'https://n8n.dtthomas.cloud/webhook/deenbuddy-email',
    download_click:  'https://n8n.dtthomas.cloud/webhook/deenbuddy-download',
    create_checkout: 'https://n8n.dtthomas.cloud/webhook/deenbuddy-create-checkout',
  };

  function sendToN8n(webhookUrl, payload) {
    if (!webhookUrl) return;
    var json = JSON.stringify(payload);
    try {
      var sent = navigator.sendBeacon(webhookUrl, new Blob([json], { type: 'text/plain' }));
      if (!sent) throw new Error('sendBeacon returned false');
    } catch(e) {
      try {
        fetch(webhookUrl, { method: 'POST', body: json, keepalive: true, mode: 'no-cors' }).catch(function() {});
      } catch(e2) {}
    }
  }

  function buildPayload(eventName, eventData) {
    var ut = (window.UnifiedTracker && window.UnifiedTracker.data) || {};
    return Object.assign({
      event_name: eventName,
      event_time: Math.floor(Date.now() / 1000),
      event_timestamp: new Date().toISOString(),
      event_id: SESSION_ID + '_' + eventName,
      session_id: SESSION_ID,
      variant: variant,
      fbclid: ut.fbclid || null, fbc: ut.fbc || null, fbp: ut.fbp || null,
      browser_id: ut.browser_id || null, client_ip: ut.client_ip || null,
      user_agent: ut.user_agent || null, source_url: ut.source_url || null,
      referrer: ut.referrer || null,
      utm_source: ut.utm_source || null, utm_medium: ut.utm_medium || null,
      utm_campaign: ut.utm_campaign || null, utm_campaign_id: ut.utm_campaign_id || null,
      utm_adset: ut.utm_adset || null, utm_adset_id: ut.utm_adset_id || null,
      utm_ad: ut.utm_ad || null, utm_ad_id: ut.utm_ad_id || null,
    }, eventData || {});
  }

  window.trackQuizEvent = function(eventName, eventData) {
    var payload = buildPayload(eventName, eventData);
    var url = '';
    switch(eventName) {
      case 'page_view':          url = N8N.page_view; break;
      case 'quiz_started':       url = N8N.quiz_start; break;
      case 'question_answered':  url = N8N.quiz_step; break;
      case 'quiz_completed':     url = N8N.quiz_complete; break;
      case 'email_captured':     url = N8N.lead; break;
      case 'download_clicked':   url = N8N.download_click; break;
      case 'checkout_initiated': url = N8N.download_click; break;
      default: return;
    }
    sendToN8n(url, payload);
    return payload;
  };

  window.QUIZ_SESSION_ID = SESSION_ID;
  window.QUIZ_VARIANT = variant;
})();
</script>

:root {

  --text: #1A1A1A;

  --night: #0C1420;

body {

  background: #F5F5F3;

  justify-content: center;
  align-items: flex-start;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---- APP SHELL ---- */
#app {

  max-width: 440px;
  min-height: 100vh;
  background: var(--bg);
  position: relative;

}

async function handleCheckout() {
  var btn = document.getElementById('ppCtaBtn');
  var container = document.getElementById('checkout-container');
  var plan = selectedPlan;
  var priceId = STRIPE_PRICES[plan];

  btn.disabled = true;
  btn.textContent = 'Loading checkout...';

  phCapture('checkout_initiated', {
    plan: plan,
    avatar: state.avatar,
    email: state.email,
    value: PLAN_VALUES[plan],
  });
  trackQuizEvent('checkout_initiated', {
    email: state.email,
    first_name: state.firstName || '',
    avatar: state.avatar,
    plan_selected: plan,
    value: PLAN_VALUES[plan],
    currency: 'USD',
  });

  try {
    var response = await fetch('/api/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        plan: plan,
        price_id: priceId,
        email: state.email,
        session_id: window.QUIZ_SESSION_ID,
        avatar: state.avatar,
        first_name: state.firstName || '',
        event_time: Math.floor(Date.now() / 1000),
        fbclid: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.fbclid) || null,
        fbc: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.fbc) || null,
        fbp: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.fbp) || null,
        browser_id: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.browser_id) || null,
        client_ip: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.client_ip) || null,
        user_agent: navigator.userAgent,
      }),
    });

    var data = await response.json();
    if (!data.client_secret) throw new Error('No client_secret returned');

    btn.style.display = 'none';
    container.style.display = 'block';
    container.innerHTML = '<div class="checkout-spinner" style="margin:40px auto;"></div>';
    container.classList.add('loading');

    var stripe = Stripe(STRIPE_PK);
    stripeCheckout = await stripe.initEmbeddedCheckout({
      clientSecret: data.client_secret,
    });
    container.innerHTML = '';
    container.classList.remove('loading');
    stripeCheckout.mount('#checkout-container');

  } catch (err) {
    console.error('[Checkout] Error:', err);
    btn.disabled = false;
    btn.textContent = 'Start Your 7-Day Free Trial';
    alert('Something went wrong loading checkout. Please try again.');
  }
}


// ---- PRICING COUNTDOWN ----
var countdownInterval;
function startPricingCountdown() {
  var totalSeconds = 599;
  function tick() {
    var min = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
    var sec = (totalSeconds % 60).toString().padStart(2, '0');
    var display = min + ':' + sec;
    var stickyMin = document.getElementById('stickyMin');
    var stickySec = document.getElementById('stickySec');
    var bannerTimer = document.getElementById('bannerTimer');
    if (stickyMin) stickyMin.textContent = min;
    if (stickySec) stickySec.textContent = sec;
    if (bannerTimer) bannerTimer.textContent = display;
    if (totalSeconds <= 0) { clearInterval(countdownInterval); return; }
    totalSeconds--;
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}


// ---- RAMADAN COUNTDOWN ----
var ramadanInterval = null;
function startRamadanCountdown() {
  var ramadanDate = new Date('2026-02-17T00:00:00');
  function tick() {
    var now = new Date();
    var diff = ramadanDate - now;
    if (diff <= 0) {
      var el = document.getElementById('ramadanCountdown');
      if (el) el.innerHTML = '<div style="color:#D4AF37; font-size:14px; font-weight:600;">Ramadan Mubarak!</div>';
      clearInterval(ramadanInterval);
      return;
    }
    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    var mins = Math.floor((diff / (1000 * 60)) % 60);
    var secs = Math.floor((diff / 1000) % 60);
    var $d = document.getElementById('ramDays');
    var $h = document.getElementById('ramHours');
    var $m = document.getElementById('ramMins');
    var $s = document.getElementById('ramSecs');
    if ($d) $d.textContent = String(days).padStart(2, '0');
    if ($h) $h.textContent = String(hours).padStart(2, '0');
    if ($m) $m.textContent = String(mins).padStart(2, '0');
    if ($s) $s.textContent = String(secs).padStart(2, '0');
  }
  tick();
  ramadanInterval = setInterval(tick, 1000);
}
