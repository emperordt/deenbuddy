<style>
/* ============================================
   DEEN BUDDY RESULTS PAGE — FULL DR REWRITE
   ============================================ */
:root {
  --primary: #51A780;
  --primary-hover: #48A078;
  --primary-light: #7CB098;
  --primary-pale: #C5E5CD;
  --primary-ghost: #EDF7F1;
  --bg: #FFFFFF;
  --surface: #F8F9F8;
  --border: #E8E8E4;
  --border-medium: #D0D0CC;
  --text: #1A1A1A;
  --text2: #505050;
  --text3: #888888;
  --text-muted: #B0B0B0;
  --night: #0C1420;
  --teal: #182830;
  --gold: #D4AF37;
  --gold-dark: #B8942E;
  --error: #D94444;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: #F5F5F3;
  color: var(--text);
  min-height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  -webkit-font-smoothing: antialiased;
}
#app {
  width: 100%;
  max-width: 440px;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow-x: hidden;
}
@media (min-width: 480px) {
  #app { box-shadow: 0 0 60px rgba(0,0,0,0.08); }
}

/* ---- STICKY TOP BAR ---- */
.sticky-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 999;
  background: linear-gradient(135deg, #0C1420 0%, #1A2A20 50%, #0C1420 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  border-bottom: 1px solid rgba(212,175,55,0.25);
}
.sticky-bar-left {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 0;
  color: var(--gold);
}
.sticky-bar-left span {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sticky-bar-timer {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.sticky-bar-digit {
  background: rgba(212,175,55,0.15);
  border: 1px solid rgba(212,175,55,0.25);
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  min-width: 24px;
  text-align: center;
  color: var(--gold);
}
.sticky-bar-sep {
  font-weight: 700;
  font-size: 12px;
  opacity: 0.7;
  color: rgba(212,175,55,0.5);
}

/* ---- SECTION BASE ---- */
.section {
  padding: 32px 24px;
}
.section-pad-top {
  padding-top: 56px; /* account for sticky bar */
}
.section-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  font-style: italic;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
  margin-bottom: 20px;
  letter-spacing: -0.01em;
}
.section-title em {
  color: var(--primary);
  font-style: italic;
}

/* ---- GOLDEN CTA (between sections) ---- */
.gold-cta {
  display: block;
  width: 100%;
  max-width: 340px;
  margin: 24px auto 0;
  padding: 16px 24px;
  background: linear-gradient(135deg, #E8C84A 0%, #D4AF37 40%, #F0D860 60%, #D4AF37 100%);
  background-size: 200% 100%;
  animation: goldShine 3s ease-in-out infinite;
  color: var(--night);
  border: none;
  border-radius: 14px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(212,175,55,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  transition: transform 0.2s, box-shadow 0.2s;
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
}
.gold-cta::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: goldSweep 4s ease-in-out infinite;
}
@keyframes goldShine {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes goldSweep {
  0% { left: -100%; }
  30% { left: 120%; }
  100% { left: 120%; }
}
.gold-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(212,175,55,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
}
.gold-cta:active { transform: translateY(0); }

/* ---- S1: HERO / QUIZ RESULTS ---- */
.hero {
  text-align: center;
  padding: 56px 24px 32px;
}
.hero-saved {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--primary);
  font-weight: 500;
  margin-bottom: 20px;
}
.hero-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary-pale), var(--primary-ghost));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
}
.hero-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.hero-tagline {
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  color: var(--text3);
  margin-bottom: 10px;
}
.hero-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  max-width: 380px;
  margin: 0 auto 24px;
  opacity: 0.85;
}
.hero-copy {
  text-align: left;
  font-size: 15px;
  color: var(--text2);
  line-height: 1.75;
  max-width: 380px;
  margin: 0 auto;
}
.hero-copy p {
  margin-bottom: 16px;
}
.hero-copy strong {
  color: var(--text);
}
.icp-outcomes {
  text-align: left;
  max-width: 400px;
  margin: 0 auto;
}
.icp-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
}
.icp-bullet {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 15px;
  color: var(--text2);
  line-height: 1.5;
}
.icp-bullet svg {
  flex-shrink: 0;
  margin-top: 3px;
}

/* ---- S2: SOCIAL PROOF INTERRUPT ---- */
.sp-interrupt {
  padding: 32px 24px;
  background: var(--surface);
}
.sp-stats {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.sp-stats-faces {
  display: flex;
  align-items: center;
}
.sp-stats-face {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--bg);
  margin-left: -8px;
  object-fit: cover;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
}
.sp-stats-face:first-child { margin-left: 0; }
.sp-stats-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sp-stats-rating {
  color: #F5A623;
  font-size: 13px;
  letter-spacing: 1px;
}
.sp-stats-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}
.sp-cards {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
  scrollbar-width: none;
}
.sp-cards::-webkit-scrollbar { display: none; }
.sp-card {
  min-width: 280px;
  max-width: 300px;
  flex-shrink: 0;
  scroll-snap-align: start;
  background: var(--bg);
  border-radius: 14px;
  padding: 20px;
  border: 1px solid var(--border);
}
.sp-card-stars {
  color: #F5A623;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.sp-card-text {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  font-style: italic;
  margin-bottom: 12px;
}
.sp-card-author {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.sp-card-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--primary-pale);
}

/* ---- S3: GROWTH CHART (Dark Ramadan) ---- */
.growth-chart-section {
  padding: 40px 24px;
}
.growth-chart {
  width: 100%;
  padding: 28px 24px 20px;
  background: linear-gradient(165deg, #1A2218 0%, #0C1420 100%);
  border-radius: 16px;
  border: 1px solid rgba(212,175,55,0.15);
  text-align: center;
  margin-bottom: 20px;
}
.growth-chart-headline {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  line-height: 1.35;
  margin-bottom: 20px;
}
.growth-chart-headline em {
  color: #D4AF37;
  font-style: italic;
}
.growth-chart svg {
  width: 100%;
  height: auto;
  margin-bottom: 12px;
}
.growth-chart-disclaimer {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-style: italic;
}
.growth-chart-stat {
  text-align: center;
  font-size: 13px;
  color: var(--text3);
  padding: 12px 16px;
  background: var(--primary-ghost);
  border-radius: 10px;
}
.growth-chart-stat strong {
  color: var(--primary);
  font-weight: 700;
}

/* ---- S4: WHAT'S INSIDE ---- */
.features-section {
  padding: 40px 24px;
  background: var(--surface);
}
.features-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.feature-card {
  padding: 20px 14px;
  background: var(--bg);
  border-radius: 14px;
  border: 1px solid var(--border);
  transition: transform 0.2s;
}
.feature-card:hover {
  transform: translateY(-2px);
}
.feature-card-icon {
  font-size: 28px;
  margin-bottom: 8px;
}
.feature-card-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.feature-card-desc {
  font-size: 11.5px;
  color: var(--text3);
  line-height: 1.45;
}
/* Privacy card — dark variant */
.feature-card.dark {
  background: var(--night);
  border-color: rgba(255,255,255,0.1);
  grid-column: 1 / -1;
}
.feature-card.dark .feature-card-name { color: #fff; }
.feature-card.dark .feature-card-desc { color: rgba(255,255,255,0.6); }

/* ---- S5: DREAM vs LOSS ---- */
.comparison-section {
  padding: 40px 24px;
}
.comparison-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
@media (max-width: 400px) {
  .comparison-grid { grid-template-columns: 1fr; }
}
.comparison-col {
  border-radius: 14px;
  padding: 20px 16px;
}
.comparison-col.positive {
  background: var(--primary-ghost);
  border: 2px solid var(--primary);
  box-shadow: 0 2px 12px rgba(81,167,128,0.15);
  transform: scale(1.02);
}
.comparison-col.negative {
  background: #FDF0F0;
  border: 1.5px solid #F0D0D0;
}
.comparison-col-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.comparison-col.positive .comparison-col-title { color: var(--primary); }
.comparison-col.negative .comparison-col-title { color: #C0504D; }
.comparison-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 10px;
}
.comparison-item:last-child { margin-bottom: 0; }
.comparison-col.positive .comparison-item { color: var(--text2); }
.comparison-col.negative .comparison-item { color: #8B5E5E; }
.comparison-check { flex-shrink: 0; margin-top: 2px; }
.comparison-closer {
  text-align: center;
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
}
.comparison-closer strong {
  display: block;
  margin-top: 4px;
  color: var(--primary);
}

/* ---- S6: RAMADAN URGENCY BANNER ---- */
.ramadan-urgency {
  margin: 0 24px;
  background: linear-gradient(135deg, #0C1420 0%, #1A2A20 50%, #0C1420 100%);
  border-radius: 16px;
  padding: 28px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1.5px solid rgba(212,175,55,0.35);
  box-shadow: 0 0 30px rgba(212,175,55,0.08);
}
.ramadan-urgency-tag {
  display: inline-block;
  background: var(--gold);
  color: var(--night);
  font-size: 11px;
  font-weight: 800;
  padding: 4px 14px;
  border-radius: 99px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.ramadan-urgency-headline {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: #fff;
  line-height: 1.3;
  margin-bottom: 10px;
}
.ramadan-urgency-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  margin-bottom: 6px;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
}
.ramadan-urgency-warning {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 18px;
}
.eid-countdown {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.eid-countdown-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.eid-countdown-value {
  background: rgba(212,175,55,0.12);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
  min-width: 44px;
  text-align: center;
}
.eid-countdown-label {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 500;
}
.eid-countdown-sep {
  font-size: 20px;
  color: rgba(212,175,55,0.4);
  font-weight: 700;
  align-self: flex-start;
  padding-top: 6px;
}

/* ---- S7: PRICING ---- */
.pricing-section {
  padding: 40px 24px;
}
.discount-box {
  background: var(--primary-ghost);
  border: 1.5px solid var(--primary-pale);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.discount-box-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.discount-code {
  background: var(--primary);
  color: #fff;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 6px;
  letter-spacing: 0.04em;
}
.discount-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
}
.discount-timer {
  font-size: 12px;
  color: var(--text3);
}
.discount-timer span {
  font-weight: 700;
  color: var(--text);
}
/* Compact guarantee variant */
.guarantee.compact {
  padding: 24px;
  margin: 0 24px 16px;
  border-radius: 14px;
}
.guarantee.compact .guarantee-text p { margin-bottom: 6px; }

/* Testimonial carousel */
.testi-carousel {
  padding: 0 24px 32px;
  overflow: hidden;
  position: relative;
}
.testi-carousel-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text3);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.testi-track {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
  scrollbar-width: none;
}
.testi-track::-webkit-scrollbar { display: none; }
.testi-card {
  flex: 0 0 85%;
  max-width: 320px;
  scroll-snap-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
}
.testi-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.testi-card-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--primary-pale);
}
.testi-card-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.testi-card-stars {
  color: #F5A623;
  font-size: 12px;
  letter-spacing: 2px;
}
.testi-card-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  font-style: italic;
}
.testi-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 12px;
}
.testi-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s, transform 0.3s;
}
.testi-dot.active {
  background: var(--primary);
  transform: scale(1.3);
}

/* Pricing tiers */
.pp-tiers {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 24px;
}
.pp-tier {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.pp-tier:first-child { border-radius: 14px 14px 0 0; }
.pp-tier:last-child { border-radius: 0 0 14px 14px; }
.pp-tier:not(:first-child) { border-top: none; }
.pp-tier:hover { background: rgba(237,247,241,0.3); }
.pp-tier.selected {
  border-color: var(--primary);
  background: var(--primary-ghost);
  z-index: 1;
  border-radius: 14px;
  margin: -1px 0;
  border-width: 2.5px;
  transform: scale(1.02);
}
/* Gold treatment only for yearly */
/* Yearly deselected — light grey so gold elements still work */
.pp-tier.yearly {
  background: #D5D5D0;
  border-color: var(--border-medium);
}
.pp-tier.yearly .pp-tier-sub-price { color: var(--text3) !important; }
/* Yearly selected — dark gold treatment */
.pp-tier.yearly.selected {
  border-color: var(--gold);
  background: linear-gradient(135deg, #0C1420 0%, #1A2218 50%, #0C1420 100%);
  box-shadow: 0 4px 24px rgba(212,175,55,0.2), inset 0 1px 0 rgba(212,175,55,0.1);
}
.pp-tier.yearly.selected .pp-tier-name { color: #fff; }
.pp-tier.yearly.selected .pp-tier-detail { color: rgba(255,255,255,0.4); }
.pp-tier.yearly.selected .pp-tier-unit { color: rgba(255,255,255,0.4); }
.pp-tier.yearly.selected .pp-tier-sub-price { color: rgba(255,255,255,0.45) !important; }
.pp-tier.yearly.selected .pp-tier-radio { border-color: var(--gold); background: var(--gold); }
.pp-tier.muted {
  opacity: 0.55;
}
.pp-tier-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.pp-tier-radio {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border-medium);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.pp-tier.selected .pp-tier-radio {
  border-color: var(--primary);
  background: var(--primary);
}
.pp-tier-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.pp-tier-detail {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.pp-tier-detail s {
  text-decoration: line-through;
  color: var(--error);
}
.pp-tier-right { text-align: right; }
.pp-tier-price {
  font-size: 24px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1;
}
.pp-tier-price.gold {
  font-size: 28px;
  color: var(--gold);
  text-shadow: 0 0 12px rgba(212,175,55,0.3);
}
.pp-tier-unit {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
}
.pp-tier-sub-price {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  font-weight: 500;
  margin-top: 2px;
}
.pp-tier-original {
  font-size: 11px;
  color: var(--text-muted);
}
.pp-tier-original s { text-decoration: line-through; }
.pp-tier-badges {
  position: absolute;
  top: -11px;
  left: 16px;
  display: flex;
  gap: 6px;
}
.pp-tier-badge {
  font-size: 9px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.pp-tier-badge.best { background: var(--gold); color: var(--night); }
.pp-tier-badge.popular { background: var(--primary); color: #fff; }
.pp-tier-badge.save { background: #D94444; color: #fff; }
.pp-tier-per-day {
  font-size: 12px;
  color: var(--primary);
  font-weight: 700;
  margin-top: 2px;
}
.pp-tier-note {
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
  text-align: center;
  margin-top: -12px;
  margin-bottom: 16px;
}
.yearly-sub {
  text-align: center;
  font-size: 13px;
  color: var(--text3);
  margin-top: -16px;
  margin-bottom: 20px;
  line-height: 1.5;
}
.yearly-sub strong {
  color: var(--primary);
}

/* ---- S8: GUARANTEE ---- */
.guarantee {
  margin: 0 24px 24px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 24px 20px;
  text-align: center;
}
.guarantee-icon {
  font-size: 32px;
  margin-bottom: 10px;
}
.guarantee-title {
  font-family: 'Playfair Display', var(--serif);
  font-style: italic;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}
.guarantee-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  max-width: 340px;
  margin: 0 auto;
}
.guarantee-text p {
  margin-bottom: 10px;
}
.guarantee-text strong {
  color: var(--text);
}
.guarantee-highlight {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 12px;
}

/* ---- S9: PRIMARY CTA ---- */
.cta-section {
  padding: 0 24px 32px;
  text-align: center;
}
.cta-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #E8C84A 0%, #D4AF37 40%, #F0D860 60%, #D4AF37 100%);
  background-size: 200% 100%;
  animation: goldShine 3s ease-in-out infinite;
  color: var(--night);
  border: none;
  border-radius: 14px;
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(212,175,55,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  margin-bottom: 10px;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.cta-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: goldSweep 4s ease-in-out infinite;
}
.cta-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(212,175,55,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
}
.cta-btn:active { transform: translateY(0); }
.cta-join {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 500;
}
.cta-fine-print {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.55;
  margin-bottom: 16px;
  max-width: 340px;
  margin-left: auto;
  margin-right: auto;
}
.trust-badges {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--text3);
}
.trust-badges span {
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

/* Inline checkout */
.inline-checkout {
  margin: 0 24px 24px;
  padding: 24px 20px;
  background: var(--bg);
  border-radius: 16px;
  border: 1.5px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.inline-checkout-header {
  text-align: center;
  margin-bottom: 16px;
}
.inline-checkout-plan {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.inline-checkout-plan .gold { color: var(--gold); }
.inline-checkout-sub {
  font-size: 12px;
  color: var(--text3);
}
.inline-checkout-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 16px;
}
#checkout-container {
  min-height: 200px;
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.3s ease;
}
#checkout-container.loading {
  display: flex;
  align-items: center;
  justify-content: center;
}
.checkout-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.inline-checkout-trust {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--text3);
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.inline-checkout-trust span {
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
}
/* ---- S10: SOCIAL PROOF WALL ---- */
.sp-wall {
  padding: 40px 24px;
  background: var(--surface);
}
.sp-wall-reviews {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
}
.sp-review {
  background: var(--bg);
  border-radius: 14px;
  padding: 18px;
  border: 1px solid var(--border);
}
.sp-review-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.sp-review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 2px solid var(--primary-pale);
}
.sp-review-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.sp-review-stars {
  color: #F5A623;
  font-size: 13px;
  letter-spacing: 2px;
}
.sp-review-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
}

/* Stats bar */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 24px 0;
  margin-bottom: 24px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-item { text-align: center; }
.stat-value {
  font-size: 24px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
}
.stat-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Live activity ticker */
.live-activity {
  position: relative;
  height: 180px;
  overflow: hidden;
  mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
}
.live-activity-inner {
  display: flex;
  flex-direction: column;
  gap: 8px;
  animation: tickerScroll 20s linear infinite;
}
@keyframes tickerScroll {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
.live-activity:hover .live-activity-inner {
  animation-play-state: paused;
}
.live-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
  flex-shrink: 0;
}
.live-item-emoji {
  font-size: 16px;
  flex-shrink: 0;
}
.live-item-text {
  flex: 1;
}
.live-item-name {
  font-weight: 600;
  color: var(--text);
}
.live-item-time {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ---- S11: MYSTERY GIFT ---- */
.mystery-gift {
  margin: 0 24px;
  background: linear-gradient(135deg, #0C1420 0%, #1A2218 50%, #0C1420 100%);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
  border: 1px solid rgba(212,175,55,0.2);
  margin-bottom: 32px;
}
.mystery-gift-icon {
  font-size: 40px;
  margin-bottom: 12px;
}
.mystery-gift-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 10px;
}
.mystery-gift-text {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  max-width: 300px;
  margin: 0 auto 8px;
}
.mystery-gift-cta {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
}

/* ---- S12: FAQ ---- */
.faq-section {
  padding: 40px 24px;
}
.faq {
  display: flex;
  flex-direction: column;
}
.faq-item {
  border-bottom: 1px solid var(--border);
}
.faq-q {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  user-select: none;
  gap: 12px;
}
.faq-q span {
  font-size: 18px;
  color: var(--text3);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.faq-item.open .faq-q span { transform: rotate(45deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.35s ease;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
}
.faq-item.open .faq-a {
  max-height: 500px;
  padding-bottom: 16px;
}

/* ---- S13: FINAL CTA ---- */
.final-cta {
  padding: 40px 24px;
  background: var(--surface);
  text-align: center;
}
.final-cta-copy {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.75;
  max-width: 360px;
  margin: 0 auto 28px;
}
.final-cta-copy p {
  margin-bottom: 12px;
}
.final-cta-copy strong {
  color: var(--text);
}
.final-cta-copy em {
  color: var(--primary);
  font-style: italic;
}

/* ---- S14: FOOTER ---- */
.footer {
  padding: 24px;
  text-align: center;
  border-top: 1px solid var(--border);
}
.footer-secure {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
  margin-bottom: 12px;
}
.footer-links a {
  font-size: 12px;
  color: var(--text3);
  text-decoration: none;
  margin: 0 8px;
}
.footer-links a:hover { color: var(--text2); }
.footer-copy {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
}

/* ---- SOCIAL PROOF TOAST ---- */
.sp-toast {
  position: fixed;
  bottom: 80px;

var _checkoutLoading = false;
async function loadInlineCheckout() {
  var container = document.getElementById('checkout-container');
  if (!container || _checkoutLoading) return;
  _checkoutLoading = true;

  // Destroy previous instance
  if (stripeCheckout) { stripeCheckout.destroy(); stripeCheckout = null; }

  var plan = selectedPlan;
  var priceId = STRIPE_PRICES[plan];

  container.innerHTML = '<div class="checkout-spinner" style="margin:40px auto;"></div>';
  container.classList.add('loading');

  phCapture('checkout_initiated', { plan: plan, avatar: state.avatar, email: state.email, value: PLAN_VALUES[plan] });
  trackQuizEvent('checkout_initiated', { email: state.email, first_name: state.firstName || '', avatar: state.avatar, plan_selected: plan, value: PLAN_VALUES[plan], currency: 'USD' });

  try {
    var response = await fetch('/api/create-checkout', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan: plan, price_id: priceId, email: state.email, session_id: window.QUIZ_SESSION_ID, avatar: state.avatar, first_name: state.firstName || '', event_time: Math.floor(Date.now() / 1000), fbclid: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.fbclid) || null, fbc: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.fbc) || null, fbp: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.fbp) || null, browser_id: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.browser_id) || null, client_ip: (window.UnifiedTracker && window.UnifiedTracker.data && window.UnifiedTracker.data.client_ip) || null, user_agent: navigator.userAgent }),
    });
    var data = await response.json();
    if (!data.client_secret) throw new Error('No client_secret');

    var stripe = Stripe(STRIPE_PK);
    stripeCheckout = await stripe.initEmbeddedCheckout({ clientSecret: data.client_secret });
    container.innerHTML = ''; container.classList.remove('loading');
    stripeCheckout.mount('#checkout-container');
  } catch (err) {
    console.error('[Checkout] Error:', err);
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">Could not load checkout. <a href="#" onclick="event.preventDefault();loadInlineCheckout();" style="color:var(--primary);font-weight:600;">Try again</a></div>';
  }
  _checkoutLoading = false;
}


// ---- STICKY BAR TIMER (7 min) ----
function startStickyTimer() {
  var total = 407; // 6:47
  function tick() {
    var h = Math.floor(total / 3600).toString().padStart(2, '0');
    var m = Math.floor((total % 3600) / 60).toString().padStart(2, '0');
    var s = (total % 60).toString().padStart(2, '0');
    var sh = document.getElementById('stickyH'); var sm = document.getElementById('stickyM'); var ss = document.getElementById('stickyS');
    if (sh) sh.textContent = h; if (sm) sm.textContent = m; if (ss) ss.textContent = s;
    // Sync urgency banner timers
    var um = document.getElementById('urgencyM'); var us = document.getElementById('urgencyS');
    if (um) um.textContent = m; if (us) us.textContent = s;
    var um2 = document.getElementById('urgencyM2'); var us2 = document.getElementById('urgencyS2');
    if (um2) um2.textContent = m; if (us2) us2.textContent = s;
    // Sync discount timer
    var dt = document.getElementById('discountTimer');
    if (dt) dt.innerHTML = '<span>' + m + ':' + s + '</span>';
    // Also update exit intent timer
    var et = document.getElementById('exitTimer'); if (et) et.textContent = m + ':' + s;
    if (total <= 0) {
      clearInterval(stickyInt);
      // Show timer-expiry popup per spec
      var timerPopup = document.getElementById('timerExpiredOverlay');
      if (timerPopup) timerPopup.classList.add('active');
      return;
    }
    total--;
  }
  tick();
  var stickyInt = setInterval(tick, 1000);
}

// ---- TESTIMONIAL CAROUSEL ----
function initTestiCarousel() {
  var track = document.getElementById('testiTrack');
  var dotsContainer = document.getElementById('testiDots');
  if (!track || !dotsContainer) return;
  var cards = track.querySelectorAll('.testi-card');
  var count = cards.length;
  // Create dots
  for (var i = 0; i < count; i++) {
    var dot = document.createElement('div');
    dot.className = 'testi-dot' + (i === 0 ? ' active' : '');
    dotsContainer.appendChild(dot);
  }
  var dots = dotsContainer.querySelectorAll('.testi-dot');
  // Update dots on scroll
  track.addEventListener('scroll', function() {
    var scrollLeft = track.scrollLeft;
    var cardWidth = cards[0].offsetWidth + 14; // gap
    var idx = Math.round(scrollLeft / cardWidth);
    dots.forEach(function(d, j) {
      d.classList.toggle('active', j === idx);
    });
  });
  // Auto-swipe every 4s
  var autoIdx = 0;
  setInterval(function() {
    autoIdx = (autoIdx + 1) % count;
    var cardWidth = cards[0].offsetWidth + 14;
    track.scrollTo({ left: autoIdx * cardWidth, behavior: 'smooth' });
  }, 4000);
}

// ---- STICKY MOBILE CTA ----
function initStickyMobileCta() {
  var cta = document.getElementById('stickyMobileCta');
  var pricing = document.getElementById('pricingSection');
  var features = document.getElementById('featuresSection');
  if (!pricing || !cta) return;
  // Start hidden — only show after scrolling past features section
  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        var pricingRect = pricing.getBoundingClientRect();
        var featuresRect = features ? features.getBoundingClientRect() : null;
        var pastFeatures = featuresRect ? featuresRect.bottom < 0 : true;
        // Show only after features section, hide after pricing section
        if (pastFeatures && pricingRect.bottom >= 0) {
          cta.classList.add('visible');
        } else {
          cta.classList.remove('visible');
        }
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
}

// ---- EXIT INTENT (desktop) ----
function initExitIntent() {

    if (shown) return;
    if (e.clientY <= 0 && e.relatedTarget === null) {
      shown = true;
      document.getElementById('exitOverlay').classList.add('active');
    }
  });
}
